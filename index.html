<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue Is Vanity - Live Masterclass</title>
    <style>
        :root {
            /* Flora Brand Guidelines.jpg Colors */
            --flora-pale-red: #FF9CA9;
            --flora-pale-orange: #FFDAB7;
            --flora-desaturated-dark-red: #9A6C6A;
            --flora-dark-gray: #252525;
            
            /* UI Mapping */
            --bg-color: #FFFFFF;
            --text-main: var(--flora-dark-gray);
            --text-muted: #666666;
            --accent-primary: var(--flora-desaturated-dark-red);
            --accent-secondary: var(--flora-pale-orange);
            
            /* Gradient defined in Flora Brand Guidelines.jpg */
            --rose-gold-gradient: linear-gradient(180deg, #FFDAB7 0%, #FF9CA9 100%);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 90%;
            text-align: center;
            padding: 40px 20px;
        }

        .header-gradient-bar {
            width: 80px;
            height: 8px;
            background: var(--rose-gold-gradient);
            border-radius: 4px;
            margin: 0 auto 20px auto;
        }

        .tagline {
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.2;
            margin: 0 0 20px 0;
            color: var(--text-main);
        }

        p.description {
            font-size: 1.15rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .form-card {
            background-color: #F9F9F9;
            border: 1px solid #EEEEEE;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .form-card h2 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 25px;
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--flora-dark-gray);
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            background-color: #FFFFFF;
            border: 2px solid #EEEEEE;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--flora-pale-orange);
        }

        .cta-btn {
            width: 100%;
            background-color: var(--accent-primary);
            color: #FFFFFF;
            border: none;
            padding: 16px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .cta-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-gradient-bar"></div>
        <div class="tagline">Exclusive Live Masterclass</div>
        <h1>Revenue Is Vanity</h1>
        <p class="description">
            Join Flora Mutahi for an elite strategic session breaking down the core principles of sustainable business growth, scaling frameworks, and metrics that actually matter.
        </p>

        <div class="form-card">
            <h2>Secure Your Virtual Seat</h2>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                </div>
                <button type="submit" class="cta-btn">Register Instantly</button>
            </form>
        </div>

        <footer>
            &copy; 2026 Flora Mutahi. All rights reserved.
        </footer>
    </div>

</body>
</html>
